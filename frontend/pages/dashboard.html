<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — FutsalBook</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="page-header">
  <div class="container">
    <h1>MY <span>DASHBOARD</span></h1>
    <p id="welcomeMsg">Welcome back!</p>
  </div>
</div>

<div class="container page-wrap">

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-value" id="statTotal">—</div><div class="stat-label">Total Bookings</div></div>
    <div class="stat-card"><div class="stat-value" id="statPending" style="color:var(--warning)">—</div><div class="stat-label">Pending</div></div>
    <div class="stat-card"><div class="stat-value" id="statApproved" style="color:var(--green)">—</div><div class="stat-label">Approved</div></div>
    <div class="stat-card"><div class="stat-value" id="statCancelled" style="color:var(--muted)">—</div><div class="stat-label">Cancelled</div></div>
  </div>

  <!-- Quick Actions -->
  <div class="card mb-3">
    <div class="card-header">
      <h2>Quick Actions</h2>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <a href="slots.html" class="btn btn-primary">⚽ Book a Slot</a>
      <a href="my-bookings.html" class="btn btn-secondary">📋 View My Bookings</a>
    </div>
  </div>

  <!-- Recent Bookings -->
  <div class="card">
    <div class="card-header">
      <h2>Recent Bookings</h2>
      <a href="my-bookings.html" class="btn btn-secondary btn-sm">View All</a>
    </div>

    <div id="loadingBookings" class="loading-wrap">
      <div class="spinner"></div>
      <p>Loading your bookings...</p>
    </div>

    <div id="bookingsContent" class="hidden">
      <div id="emptyBookings" class="empty-state hidden">
        <div class="icon">📭</div>
        <h3>No bookings yet</h3>
        <p>You haven't made any bookings. <a href="slots.html">Book your first slot →</a></p>
      </div>
      <div class="table-wrap" id="bookingsTableWrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Date</th>
              <th>Time</th>
              <th>Price</th>
              <th>Status</th>
              <th>Booked On</th>
            </tr>
          </thead>
          <tbody id="bookingsTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script src="../js/app.js"></script>
<script>
  if (!Auth.requireLogin()) {}

  const user = Auth.get();
  document.getElementById('welcomeMsg').textContent = `Welcome back, ${user.name}! Here's your booking summary.`;
  renderNavbar('dashboard');

  async function loadDashboard() {
    try {
      const bookings = await BookingAPI.getByUser(user.userId);
      const recent   = bookings.slice(0, 5);

      // Stats
      document.getElementById('statTotal').textContent     = bookings.length;
      document.getElementById('statPending').textContent   = bookings.filter(b => b.status === 'PENDING').length;
      document.getElementById('statApproved').textContent  = bookings.filter(b => b.status === 'APPROVED').length;
      document.getElementById('statCancelled').textContent = bookings.filter(b => b.status === 'CANCELLED').length;

      document.getElementById('loadingBookings').classList.add('hidden');
      document.getElementById('bookingsContent').classList.remove('hidden');

      if (bookings.length === 0) {
        document.getElementById('emptyBookings').classList.remove('hidden');
        document.getElementById('bookingsTableWrap').classList.add('hidden');
        return;
      }

      const tbody = document.getElementById('bookingsTableBody');
      tbody.innerHTML = recent.map((b, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${formatDate(b.timeSlot.slotDate)}</td>
          <td>${formatTime(b.timeSlot.startTime)} – ${formatTime(b.timeSlot.endTime)}</td>
          <td style="color:var(--accent);font-weight:600">NPR ${b.timeSlot.price}</td>
          <td>${statusBadge(b.status)}</td>
          <td class="text-muted text-sm">${formatDateTime(b.bookedAt)}</td>
        </tr>
      `).join('');

    } catch (err) {
      showToast(err.message, 'error');
      document.getElementById('loadingBookings').classList.add('hidden');
    }
  }

  loadDashboard();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — FutsalBook</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box" style="max-width:480px">
    <div class="auth-logo">
      <div class="ball">⚽</div>
      <h1>Futsal<span>Book</span></h1>
      <p>Create your account — it's free</p>
    </div>

    <div id="alertMsg" class="alert alert-error">
      <span>⚠️</span><span id="alertText"></span>
    </div>
    <div id="successMsg" class="alert alert-success">
      <span>✅</span><span>Account created! Redirecting to login...</span>
    </div>

    <form id="registerForm">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="name" class="form-control" placeholder="John Doe" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" id="phone" class="form-control" placeholder="98XXXXXXXX" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat password" required>
        </div>
      </div>
      <button type="submit" id="submitBtn" class="btn btn-primary btn-full btn-lg mt-2">
        Create Account
      </button>
    </form>

    <div class="auth-divider">— or —</div>
    <p style="text-align:center;font-size:14px;color:var(--muted)">
      Already have an account? <a href="login.html">Sign in</a>
    </p>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const alertEl = document.getElementById('alertMsg');
    const alertText = document.getElementById('alertText');
    const successEl = document.getElementById('successMsg');

    alertEl.classList.remove('show');
    successEl.classList.remove('show');

    const password = document.getElementById('password').value;
    const confirmPw = document.getElementById('confirmPassword').value;

    if (password !== confirmPw) {
      alertText.textContent = 'Passwords do not match.';
      alertEl.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating account...';

    try {
      const user = {
        name:     document.getElementById('name').value.trim(),
        email:    document.getElementById('email').value.trim(),
        phone:    document.getElementById('phone').value.trim(),
        password: password,
      };

      await UserAPI.register(user);
      successEl.classList.add('show');
      setTimeout(() => window.location.href = 'login.html', 1800);

    } catch (err) {
      alertText.textContent = err.message;
      alertEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  });
</script>
</body>
</html>

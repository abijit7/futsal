<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Slots — FutsalBook Admin</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="page-header">
  <div class="container">
    <h1>MANAGE <span>SLOTS</span></h1>
    <p>Add, edit, and remove available time slots</p>
  </div>
</div>

<div class="container page-wrap">

  <div style="display:grid;grid-template-columns:1fr 2fr;gap:24px;align-items:start">

    <!-- Add/Edit Form -->
    <div class="card" style="position:sticky;top:80px">
      <div class="card-header">
        <h3 id="formTitle">Add New Slot</h3>
      </div>
      <form id="slotForm">
        <input type="hidden" id="slotId">
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" id="slotDate" class="form-control" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Start Time</label>
            <input type="time" id="startTime" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">End Time</label>
            <input type="time" id="endTime" class="form-control" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Price (NPR)</label>
          <input type="number" id="price" class="form-control" placeholder="e.g. 1500" min="0" step="50" required>
        </div>
        <div id="formAlert" class="alert alert-error">
          <span>⚠️</span><span id="formAlertText"></span>
        </div>
        <div style="display:flex;gap:8px">
          <button type="submit" id="submitSlotBtn" class="btn btn-primary" style="flex:1">Add Slot</button>
          <button type="button" onclick="resetForm()" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <!-- Slots Table -->
    <div class="card">
      <div class="card-header">
        <h3>All Slots</h3>
        <button onclick="loadSlots()" class="btn btn-secondary btn-sm">🔄 Refresh</button>
      </div>

      <div id="loadingSlots" class="loading-wrap">
        <div class="spinner"></div>
        <p>Loading slots...</p>
      </div>

      <div id="slotsContent" class="hidden">
        <div id="emptySlots" class="empty-state hidden">
          <div class="icon">📭</div>
          <h3>No slots found</h3>
          <p>Add your first slot using the form.</p>
        </div>
        <div class="table-wrap" id="slotsTableWrap">
          <table>
            <thead>
              <tr><th>Date</th><th>Start</th><th>End</th><th>Duration</th><th>Price</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="slotsTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="../js/app.js"></script>
<script>
  if (!Auth.requireLogin(true)) {}
  renderNavbar('slots');

  // Set min date to today
  document.getElementById('slotDate').min = new Date().toISOString().split('T')[0];

  let editingId = null;

  async function loadSlots() {
    document.getElementById('loadingSlots').classList.remove('hidden');
    document.getElementById('slotsContent').classList.add('hidden');
    try {
      const slots = await SlotAPI.getAll();
      document.getElementById('loadingSlots').classList.add('hidden');
      document.getElementById('slotsContent').classList.remove('hidden');

      if (slots.length === 0) {
        document.getElementById('emptySlots').classList.remove('hidden');
        document.getElementById('slotsTableWrap').classList.add('hidden');
        return;
      }
      document.getElementById('emptySlots').classList.add('hidden');
      document.getElementById('slotsTableWrap').classList.remove('hidden');

      document.getElementById('slotsTableBody').innerHTML = slots.map(s => `
        <tr>
          <td>${formatDate(s.slotDate)}</td>
          <td>${formatTime(s.startTime)}</td>
          <td>${formatTime(s.endTime)}</td>
          <td class="text-muted text-sm">${calculateDuration(s.startTime, s.endTime)}</td>
          <td style="color:var(--accent);font-weight:600">NPR ${s.price}</td>
          <td>
            <span class="badge ${s.available ? 'badge-available' : 'badge-booked'}">
              ${s.available ? 'Available' : 'Booked'}
            </span>
          </td>
          <td>
            <div style="display:flex;gap:6px">
              <button class="btn btn-secondary btn-sm" onclick="editSlot(${JSON.stringify(s).replace(/"/g, '&quot;')})">✏️ Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteSlot(${s.slotId})">🗑️</button>
            </div>
          </td>
        </tr>
      `).join('');
    } catch (err) {
      showToast(err.message, 'error');
      document.getElementById('loadingSlots').classList.add('hidden');
    }
  }

  document.getElementById('slotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitSlotBtn');
    const alertEl = document.getElementById('formAlert');
    const alertText = document.getElementById('formAlertText');
    alertEl.classList.remove('show');

    btn.disabled = true;
    btn.textContent = editingId ? 'Saving...' : 'Adding...';

    const slotData = {
      slotDate:  document.getElementById('slotDate').value,
      startTime: document.getElementById('startTime').value + ':00',
      endTime:   document.getElementById('endTime').value + ':00',
      price:     parseFloat(document.getElementById('price').value),
      available: true
    };

    try {
      if (editingId) {
        await SlotAPI.update(editingId, slotData);
        showToast('Slot updated successfully ✅', 'success');
        resetForm();
      } else {
        await SlotAPI.add(slotData);
        showToast('Slot added successfully ✅', 'success');
        resetForm();
      }
      loadSlots();
    } catch (err) {
      alertText.textContent = err.message;
      alertEl.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.textContent = editingId ? 'Save Changes' : 'Add Slot';
    }
  });

  function editSlot(slot) {
    editingId = slot.slotId;
    document.getElementById('formTitle').textContent = 'Edit Slot';
    document.getElementById('submitSlotBtn').textContent = 'Save Changes';
    document.getElementById('slotDate').value  = slot.slotDate;
    document.getElementById('startTime').value = slot.startTime ? slot.startTime.substring(0,5) : '';
    document.getElementById('endTime').value   = slot.endTime ? slot.endTime.substring(0,5) : '';
    document.getElementById('price').value     = slot.price;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function resetForm() {
    editingId = null;
    document.getElementById('slotForm').reset();
    document.getElementById('formTitle').textContent = 'Add New Slot';
    document.getElementById('submitSlotBtn').textContent = 'Add Slot';
    document.getElementById('formAlert').classList.remove('show');
    document.getElementById('slotDate').min = new Date().toISOString().split('T')[0];
  }

  async function deleteSlot(slotId) {
    showConfirm('Delete this slot? This cannot be undone.', async () => {
      try {
        await SlotAPI.delete(slotId);
        showToast('Slot deleted', 'success');
        loadSlots();
      } catch (err) {
        showToast(err.message, 'error');
      }
    });
  }

  loadSlots();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Users — FutsalBook Admin</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="page-header">
  <div class="container">
    <h1>MANAGE <span>USERS</span></h1>
    <p>View all registered users on the platform</p>
  </div>
</div>

<div class="container page-wrap">

  <!-- Search -->
  <div class="card mb-3">
    <input type="text" id="searchInput" class="form-control" placeholder="🔍 Search users by name or email..." oninput="searchUsers()">
  </div>

  <div class="card">
    <div class="card-header">
      <h2>All Users</h2>
      <button onclick="loadUsers()" class="btn btn-secondary btn-sm">🔄 Refresh</button>
    </div>

    <div id="loadingUsers" class="loading-wrap">
      <div class="spinner"></div>
      <p>Loading users...</p>
    </div>

    <div id="usersContent" class="hidden">
      <div id="emptyUsers" class="empty-state hidden">
        <div class="icon">👥</div>
        <h3>No users found</h3>
      </div>
      <div class="table-wrap" id="usersTableWrap">
        <table>
          <thead>
            <tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Joined</th><th>Actions</th></tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script src="../js/app.js"></script>
<script>
  if (!Auth.requireLogin(true)) {}
  renderNavbar('users');

  let allUsers = [];

  async function loadUsers() {
    document.getElementById('loadingUsers').classList.remove('hidden');
    document.getElementById('usersContent').classList.add('hidden');
    try {
      allUsers = await UserAPI.getAll();
      renderUsers(allUsers);
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      document.getElementById('loadingUsers').classList.add('hidden');
      document.getElementById('usersContent').classList.remove('hidden');
    }
  }

  function searchUsers() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allUsers.filter(u =>
      u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)
    );
    renderUsers(filtered);
  }

  function renderUsers(users) {
    const tbody = document.getElementById('usersTableBody');
    const empty = document.getElementById('emptyUsers');
    const tableWrap = document.getElementById('usersTableWrap');

    if (users.length === 0) {
      empty.classList.remove('hidden');
      tableWrap.classList.add('hidden');
      return;
    }
    empty.classList.add('hidden');
    tableWrap.classList.remove('hidden');

    tbody.innerHTML = users.map((u, i) => `
      <tr>
        <td class="text-muted text-sm">${i + 1}</td>
        <td>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="nav-avatar">${u.name.charAt(0).toUpperCase()}</div>
            <span class="fw-bold">${u.name}</span>
          </div>
        </td>
        <td class="text-muted">${u.email}</td>
        <td class="text-muted">${u.phone}</td>
        <td>
          <span class="badge ${u.role === 'ADMIN' ? 'badge-approved' : 'badge-pending'}">
            ${u.role}
          </span>
        </td>
        <td class="text-muted text-sm">${formatDateTime(u.createdAt)}</td>
        <td>
          ${u.role !== 'ADMIN' ? `
            <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.userId}, '${u.name}')">🗑️ Delete</button>
          ` : '<span class="text-muted text-sm">Protected</span>'}
        </td>
      </tr>
    `).join('');
  }

  async function deleteUser(userId, name) {
    showConfirm(`Delete user "${name}"? This will also delete their bookings.`, async () => {
      try {
        await UserAPI.delete(userId);
        showToast('User deleted successfully', 'success');
        loadUsers();
      } catch (err) {
        showToast(err.message, 'error');
      }
    });
  }

  loadUsers();
</script>
</body>
</html>

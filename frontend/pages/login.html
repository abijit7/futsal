<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — FutsalBook</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="ball">⚽</div>
      <h1>Futsal<span>Book</span></h1>
      <p>Sign in to your account</p>
    </div>

    <div id="alertMsg" class="alert alert-error">
      <span>⚠️</span><span id="alertText"></span>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" id="submitBtn" class="btn btn-primary btn-full btn-lg mt-2">
        Sign In
      </button>
    </form>

    <div class="auth-divider">— or —</div>
    <p style="text-align:center;font-size:14px;color:var(--muted)">
      Don't have an account?
      <a href="register.html">Create one</a>
    </p>
    <p style="text-align:center;font-size:13px;color:var(--muted2);margin-top:16px">
      Admin? Use your admin credentials to log in above.
    </p>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.isLoggedIn()) {
    window.location.href = Auth.isAdmin() ? 'admin-dashboard.html' : 'dashboard.html';
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const alertEl = document.getElementById('alertMsg');
    const alertText = document.getElementById('alertText');

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    alertEl.classList.remove('show');

    try {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const user = await UserAPI.login(email, password);
      Auth.save(user);
      showToast(`Welcome back, ${user.name}! 👋`, 'success');

      setTimeout(() => {
        if (user.role === 'ADMIN') {
          window.location.href = 'admin-dashboard.html';
        } else {
          window.location.href = 'dashboard.html';
        }
      }, 800);

    } catch (err) {
      alertText.textContent = err.message;
      alertEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
